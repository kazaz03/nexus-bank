spring.application.name=account-service
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3307/account_service_db
spring.datasource.username=nexus
spring.datasource.password=nexus123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# When running multiple instances of account-service for the load-balancing
# demo, only the first instance should manage the Docker Compose stack.
# "start-only" tells the Spring Boot Docker Compose plugin to start the
# stack on app boot but NOT to stop it on app shutdown — so killing one
# instance does not tear down the shared MySQL container that other
# instances depend on.
spring.docker.compose.lifecycle-management=start-only

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

app.instance-id=${eureka.instance.instance-id}