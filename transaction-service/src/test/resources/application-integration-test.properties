# Disable Eureka so tests don't need a running registry
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable Docker Compose — the Testcontainer provides MySQL instead
spring.docker.compose.enabled=false

# Drop and recreate schema on each context startup for test isolation
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy direct URL for AccountClient — real HTTP calls are mocked in transfer tests
app.account-service.direct-url=http://localhost:9999

# Suppress noisy SQL/stats output in test logs
spring.jpa.show-sql=false
logging.level.org.hibernate.stat=WARN
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF

# Disable role-based authorization for integration tests — RBAC is verified
# end-to-end through the gateway in Postman. Tests target service logic.
nexus.security.enabled=false
